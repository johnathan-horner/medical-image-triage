version: '3.8'

services:
  medical-triage-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./medical_triage.db:/app/medical_triage.db
    environment:
      - MODEL_PATH=/app/models/medical_model
      - DATABASE_URL=sqlite:///./medical_triage.db
    restart: unless-stopped

  # Optional: Add TensorFlow Serving for model serving
  tf-serving:
    image: tensorflow/serving:latest
    ports:
      - "8501:8501"
    volumes:
      - ./models:/models
    environment:
      - MODEL_NAME=medical_model
    command: >
      tensorflow_model_server
      --rest_api_port=8501
      --model_name=medical_model
      --model_base_path=/models/medical_model
    restart: unless-stopped